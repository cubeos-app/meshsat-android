syntax = "proto3";

package meshtastic;

option java_package = "com.geeksville.mesh";
option java_outer_classname = "ConfigProtos";

message Config {
  message DeviceConfig {
    enum Role {
      CLIENT = 0;
      CLIENT_MUTE = 1;
      ROUTER = 2;
      ROUTER_CLIENT = 3;
      REPEATER = 4;
      TRACKER = 5;
      SENSOR = 6;
      TAK = 7;
      CLIENT_HIDDEN = 8;
      LOST_AND_FOUND = 9;
      TAK_TRACKER = 10;
    }

    enum RebroadcastMode {
      ALL = 0;
      ALL_SKIP_DECODING = 1;
      LOCAL_ONLY = 2;
      KNOWN_ONLY = 3;
      CORE_PORTNUMS_ONLY = 4;
    }

    Role role = 1;
    bool serial_enabled = 2;
    bool debug_log_enabled = 3;
    uint32 button_gpio = 4;
    uint32 buzzer_gpio = 5;
    RebroadcastMode rebroadcast_mode = 6;
    uint32 node_info_broadcast_secs = 7;
    bool double_tap_as_button_press = 8;
    bool is_managed = 9;
    bool disable_triple_click = 10;
    string tzdef = 11;
    bool led_heartbeat_disabled = 12;
  }

  message PositionConfig {
    uint32 position_broadcast_secs = 1;
    bool position_broadcast_smart_enabled = 2;
    bool fixed_position = 3;
    bool gps_enabled = 4;
    uint32 gps_update_interval = 5;
    uint32 gps_attempt_time = 6;
    uint32 position_flags = 7;
    uint32 rx_gpio = 9;
    uint32 tx_gpio = 10;
    uint32 broadcast_smart_minimum_distance = 11;
    uint32 broadcast_smart_minimum_interval_secs = 12;
    uint32 gps_en_gpio = 8;
    GpsMode gps_mode = 13;

    enum GpsMode {
      DISABLED = 0;
      ENABLED = 1;
      NOT_PRESENT = 2;
    }
  }

  message PowerConfig {
    bool is_power_saving = 1;
    uint32 on_battery_shutdown_after_secs = 2;
    float adc_multiplier_override = 3;
    uint32 wait_bluetooth_secs = 4;
    uint32 sds_secs = 6;
    uint32 ls_secs = 7;
    uint32 min_wake_secs = 8;
    uint32 device_battery_ina_address = 9;
  }

  message NetworkConfig {
    bool wifi_enabled = 1;
    string wifi_ssid = 3;
    string wifi_psk = 4;
    string ntp_server = 5;
    bool eth_enabled = 6;

    enum AddressMode {
      DHCP = 0;
      STATIC = 1;
    }

    AddressMode address_mode = 7;

    message IpV4Config {
      fixed32 ip = 1;
      fixed32 gateway = 2;
      fixed32 subnet = 3;
      fixed32 dns = 4;
    }

    IpV4Config ipv4_config = 8;
    string rsyslog_server = 9;
  }

  message DisplayConfig {
    uint32 screen_on_secs = 1;

    enum GpsCoordinateFormat {
      DEC = 0;
      DMS = 1;
      UTM = 2;
      MGRS = 3;
      OLC = 4;
      OSGR = 5;
    }

    GpsCoordinateFormat gps_format = 2;
    uint32 auto_screen_carousel_secs = 3;
    bool compass_north_top = 4;
    bool flip_screen = 5;

    enum DisplayUnits {
      METRIC = 0;
      IMPERIAL = 1;
    }

    DisplayUnits units = 6;

    enum OledType {
      OLED_AUTO = 0;
      OLED_SSD1306 = 1;
      OLED_SH1106 = 2;
      OLED_SH1107 = 3;
    }

    OledType oled = 7;

    enum DisplayMode {
      DEFAULT = 0;
      TWOCOLOR = 1;
      INVERTED = 2;
      COLOR = 3;
    }

    DisplayMode displaymode = 8;
    bool heading_bold = 9;
    bool wake_on_tap_or_motion = 10;
    uint32 compass_orientation = 11;
  }

  message LoRaConfig {
    enum RegionCode {
      UNSET = 0;
      US = 1;
      EU_433 = 2;
      EU_868 = 3;
      CN = 4;
      JP = 5;
      ANZ = 6;
      KR = 7;
      TW = 8;
      RU = 9;
      IN = 10;
      NZ_865 = 11;
      TH = 12;
      LORA_24 = 13;
      UA_433 = 14;
      UA_868 = 15;
      MY_433 = 16;
      MY_919 = 17;
      SG_923 = 18;
    }

    enum ModemPreset {
      LONG_FAST = 0;
      LONG_SLOW = 1;
      VERY_LONG_SLOW = 2;
      MEDIUM_SLOW = 3;
      MEDIUM_FAST = 4;
      SHORT_SLOW = 5;
      SHORT_FAST = 6;
      LONG_MODERATE = 7;
      SHORT_TURBO = 8;
    }

    bool use_preset = 1;
    ModemPreset modem_preset = 2;
    uint32 bandwidth = 3;
    uint32 spread_factor = 4;
    uint32 coding_rate = 5;
    float frequency_offset = 6;
    RegionCode region = 7;
    uint32 hop_limit = 8;
    bool tx_enabled = 9;
    int32 tx_power = 10;
    uint32 channel_num = 11;
    bool override_duty_cycle = 12;
    bool sx126x_rx_boosted_gain = 13;
    float override_frequency = 14;
    bool pa_fan_disabled = 15;
    repeated uint32 ignore_incoming = 103;
    bool ignore_mqtt = 104;
    bool config_ok_to_mqtt = 105;
  }

  message BluetoothConfig {
    bool enabled = 1;

    enum PairingMode {
      RANDOM_PIN = 0;
      FIXED_PIN = 1;
      NO_PIN = 2;
    }

    PairingMode mode = 2;
    uint32 fixed_pin = 3;
  }

  message SecurityConfig {
    bytes public_key = 1;
    repeated bytes private_key = 2;
    repeated bytes admin_key = 3;
    bool is_managed = 4;
    bool serial_enabled = 5;
    bool debug_log_api_enabled = 6;
    bool admin_channel_enabled = 8;
  }

  oneof payload_variant {
    DeviceConfig device = 1;
    PositionConfig position = 2;
    PowerConfig power = 3;
    NetworkConfig network = 4;
    DisplayConfig display = 5;
    LoRaConfig lora = 6;
    BluetoothConfig bluetooth = 7;
    SecurityConfig security = 8;
  }
}
