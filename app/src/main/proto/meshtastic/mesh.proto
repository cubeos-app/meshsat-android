syntax = "proto3";

package meshtastic;

option java_package = "com.geeksville.mesh";
option java_outer_classname = "MeshProtos";

import "meshtastic/portnums.proto";
import "meshtastic/telemetry.proto";
import "meshtastic/config.proto";
import "meshtastic/module_config.proto";
import "meshtastic/channel.proto";

enum HardwareModel {
  UNSET = 0;
  TLORA_V2 = 1;
  TLORA_V1 = 2;
  TLORA_V2_1_1P6 = 3;
  TBEAM = 4;
  HELTEC_V2_0 = 5;
  TBEAM_V0P7 = 6;
  T_ECHO = 7;
  TLORA_V1_1P3 = 8;
  RAK4631 = 9;
  HELTEC_V2_1 = 10;
  HELTEC_V1 = 11;
  LILYGO_TBEAM_S3_CORE = 12;
  RAK11200 = 13;
  NANO_G1 = 14;
  TLORA_V2_1_1P8 = 15;
  TLORA_T3_S3 = 16;
  NANO_G1_EXPLORER = 17;
  NANO_G2_ULTRA = 18;
  LORA_TYPE = 19;
  WIPHONE = 20;
  WIO_WM1110 = 21;
  RAK2560 = 22;
  HELTEC_HRU_3601 = 23;
  STATION_G1 = 25;
  RAK11310 = 26;
  SENSELORA_RP2040 = 27;
  SENSELORA_S3 = 28;
  CANARYONE = 29;
  RP2040_LORA = 30;
  STATION_G2 = 31;
  LORA_RELAY_V1 = 32;
  NRF52840DK = 33;
  PPR = 34;
  GENIEBLOCKS = 35;
  NRF52_UNKNOWN = 36;
  PORTDUINO = 37;
  ANDROID_SIM = 38;
  DIY_V1 = 39;
  NRF52840_PCA10059 = 40;
  DR_DEV = 41;
  M5STACK = 42;
  HELTEC_V3 = 43;
  HELTEC_WSL_V3 = 44;
  BETAFPV_2400_TX = 45;
  BETAFPV_900_NANO_TX = 46;
  RPI_PICO = 47;
  HELTEC_WIRELESS_TRACKER = 48;
  HELTEC_WIRELESS_PAPER = 49;
  T_DECK = 50;
  T_WATCH_S3 = 51;
  PICOMPUTER_S3 = 52;
  HELTEC_HT62 = 53;
  EBYTE_ESP32_S3 = 54;
  ESP32_S3_PICO = 55;
  CHATTER_2 = 56;
  HELTEC_WIRELESS_PAPER_V1_0 = 57;
  HELTEC_WIRELESS_TRACKER_V1_0 = 58;
  UNPHONE = 59;
  TD_LORAC = 60;
  CDEBYTE_EORA_S3 = 61;
  TWC_MESH_V4 = 62;
  NRF52_PROMICRO_DIY = 63;
  RADIOMASTER_900_BANDIT_NANO = 64;
  HELTEC_CAPSULE_SENSOR_V3 = 65;
  HELTEC_VISION_MASTER_T190 = 66;
  HELTEC_VISION_MASTER_E213 = 67;
  HELTEC_VISION_MASTER_E290 = 68;
  HELTEC_MESH_NODE_T114 = 69;
  SENSECAP_INDICATOR = 70;
  TRACKER_T1000_E = 71;
  RAK3172 = 72;
  WIO_E5 = 73;
  RADIOMASTER_900_BANDIT = 74;
  ME25LS01_4Y10TD = 75;
  RP2040_FEATHER_RFM95 = 76;
  M5STACK_COREBASIC = 77;
  M5STACK_CORE2 = 78;
  RPI_PICO2 = 79;
  PRIVATE_HW = 255;
}

enum Constants {
  ZERO = 0;
  DATA_PAYLOAD_LEN = 237;
}

message Position {
  sfixed32 latitude_i = 1;
  sfixed32 longitude_i = 2;
  int32 altitude = 3;
  fixed32 time = 4;

  enum LocSource {
    LOC_UNSET = 0;
    LOC_MANUAL = 1;
    LOC_INTERNAL = 2;
    LOC_EXTERNAL = 3;
  }

  LocSource location_source = 5;

  enum AltSource {
    ALT_UNSET = 0;
    ALT_MANUAL = 1;
    ALT_INTERNAL = 2;
    ALT_EXTERNAL = 3;
    ALT_BAROMETRIC = 4;
  }

  AltSource altitude_source = 6;
  fixed32 timestamp = 7;
  int32 timestamp_millis_adjust = 8;
  int32 altitude_hae = 9;
  int32 altitude_geoidal_separation = 10;
  uint32 PDOP = 11;
  uint32 HDOP = 12;
  uint32 VDOP = 13;
  uint32 gps_accuracy = 14;
  int32 ground_speed = 15;
  int32 ground_track = 16;
  uint32 fix_quality = 17;
  uint32 fix_type = 18;
  uint32 sats_in_view = 19;
  uint32 sensor_id = 20;
  int32 next_update = 21;
  uint32 seq_number = 22;
  int32 precision_bits = 23;
}

message User {
  string id = 1;
  string long_name = 2;
  string short_name = 3;
  bytes macaddr = 4;
  HardwareModel hw_model = 5;
  bool is_licensed = 6;

  enum Role {
    CLIENT = 0;
    CLIENT_MUTE = 1;
    ROUTER = 2;
    ROUTER_CLIENT = 3;
    REPEATER = 4;
    TRACKER = 5;
    SENSOR = 6;
    TAK = 7;
    CLIENT_HIDDEN = 8;
    LOST_AND_FOUND = 9;
    TAK_TRACKER = 10;
  }

  Role role = 7;
  bytes public_key = 8;
  bool is_unmessagable = 9;
}

message RouteDiscovery {
  repeated fixed32 route = 1;
  repeated int32 snr_towards = 2;
  repeated int32 snr_back = 3;
}

message Routing {
  oneof variant {
    RouteDiscovery route_request = 1;
    RouteDiscovery route_reply = 2;
    Error error_reason = 3;
  }

  enum Error {
    NONE = 0;
    NO_ROUTE = 1;
    GOT_NAK = 2;
    TIMEOUT = 3;
    NO_INTERFACE = 4;
    MAX_RETRANSMIT = 5;
    NO_CHANNEL = 6;
    TOO_LARGE = 7;
    NO_RESPONSE = 8;
    DUTY_CYCLE_LIMIT = 9;
    BAD_REQUEST = 32;
    NOT_AUTHORIZED = 33;
    PKI_FAILED = 34;
    PKI_UNKNOWN_PUBKEY = 35;
  }
}

message Data {
  PortNum portnum = 1;
  bytes payload = 2;
  bool want_response = 3;
  fixed32 dest = 4;
  fixed32 source = 5;
  fixed32 request_id = 6;
  fixed32 reply_id = 7;
  uint32 emoji = 8;
  uint32 bitfield = 9;
}

message Waypoint {
  uint32 id = 1;
  sfixed32 latitude_i = 2;
  sfixed32 longitude_i = 3;
  fixed32 expire = 4;
  uint32 locked_to = 5;
  string name = 6;
  string description = 7;
  fixed32 icon = 8;
}

message MeshPacket {
  fixed32 from = 1;
  fixed32 to = 2;
  uint32 channel = 3;

  oneof payload_variant {
    Data decoded = 4;
    bytes encrypted = 5;
  }

  fixed32 id = 6;
  fixed32 rx_time = 7;
  float rx_snr = 8;
  uint32 hop_limit = 9;
  bool want_ack = 10;

  enum Priority {
    UNSET = 0;
    MIN = 1;
    BACKGROUND = 10;
    DEFAULT = 64;
    RELIABLE = 70;
    ACK = 120;
    MAX = 127;
  }

  Priority priority = 11;
  int32 rx_rssi = 12;

  enum Delayed {
    NO_DELAY = 0;
    DELAYED_BROADCAST = 1;
    DELAYED_DIRECT = 2;
  }

  Delayed delayed = 13;
  bool via_mqtt = 14;
  uint32 hop_start = 15;
  bytes public_key = 16;
  bool pki_encrypted = 17;
  uint32 next_hop = 18;
  uint32 relay_node = 19;
}

message NodeInfo {
  uint32 num = 1;
  User user = 2;
  Position position = 3;
  float snr = 4;
  fixed32 last_heard = 5;
  DeviceMetrics device_metrics = 6;
  uint32 channel = 7;
  bool via_mqtt = 8;
  uint32 hops_away = 9;
  bool is_favorite = 10;
  bool is_ignored = 11;
  bool is_verified = 12;
  bool is_muted = 13;
}

message MyNodeInfo {
  uint32 my_node_num = 1;
  uint32 reboot_count = 8;
  uint32 min_app_version = 11;
}

message LogRecord {
  string message = 1;
  fixed32 time = 2;
  string source = 3;

  enum Level {
    UNSET = 0;
    CRITICAL = 50;
    ERROR = 40;
    WARNING = 30;
    INFO = 20;
    DEBUG = 10;
    TRACE = 5;
  }

  Level level = 4;
}

message QueueStatus {
  int32 res = 1;
  uint32 free = 2;
  uint32 maxlen = 3;
  uint32 mesh_packet_id = 4;
}

message Neighbor {
  uint32 node_id = 1;
  float snr = 2;
  fixed32 last_rx_time = 3;
  uint32 node_broadcast_interval_secs = 4;
}

message NeighborInfo {
  uint32 node_id = 1;
  fixed32 last_sent_by_id = 2;
  uint32 node_broadcast_interval_secs = 3;
  repeated Neighbor neighbors = 4;
}

message DeviceMetadata {
  string firmware_version = 1;
  uint32 device_state_version = 2;
  bool can_shutdown = 3;
  bool has_wifi = 4;
  bool has_bluetooth = 5;
  bool has_ethernet = 6;
  Config.DeviceConfig.Role role = 7;
  uint32 position_flags = 8;
  HardwareModel hw_model = 9;
  bool has_remote_hardware = 10;
}

message Heartbeat {}

message ClientNotification {
  uint32 reply_id = 1;
  fixed32 time = 2;

  enum Level {
    UNSET = 0;
    CRITICAL = 50;
    ERROR = 40;
    WARNING = 30;
    INFO = 20;
    DEBUG = 10;
    TRACE = 5;
  }

  Level level = 3;
  string message = 4;
}

message FileInfo {
  string file_name = 1;
  uint32 size_bytes = 2;
}

message ToRadio {
  oneof payload_variant {
    MeshPacket packet = 1;
    uint32 want_config_id = 3;
    bool disconnect = 4;
    Heartbeat heartbeat = 5;
  }
}

message FromRadio {
  uint32 id = 1;
  oneof payload_variant {
    MeshPacket packet = 2;
    MyNodeInfo my_info = 3;
    NodeInfo node_info = 4;
    Config config = 5;
    LogRecord log_record = 6;
    uint32 config_complete_id = 7;
    bool rebooted = 8;
    ModuleConfig moduleConfig = 9;
    Channel channel = 10;
    QueueStatus queueStatus = 11;
    DeviceMetadata metadata = 13;
    MqttClientProxyMessage mqttClientProxyMessage = 14;
    FileInfo fileInfo = 15;
    ClientNotification clientNotification = 16;
  }
}

message MqttClientProxyMessage {
  string topic = 1;
  oneof payload_variant {
    bytes data = 2;
    string text = 3;
  }
  bool retained = 4;
}
