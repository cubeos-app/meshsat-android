name: Bug Report
description: Report a software bug in MeshSat Android
labels: [bug]
body:
  - type: markdown
    attributes:
      value: "## Bug Report"
  - type: input
    id: version
    attributes:
      label: App Version
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: android
    attributes:
      label: Android Version
      placeholder: "14"
    validations:
      required: true
  - type: input
    id: device
    attributes:
      label: Device Model
      placeholder: "Pixel 8, Samsung S24, etc."
    validations:
      required: true
  - type: dropdown
    id: transport
    attributes:
      label: Affected Transport
      options:
        - Meshtastic BLE
        - Iridium SPP
        - SMS
        - All / General
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: What happened?
      placeholder: Describe the bug
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs
      render: shell
