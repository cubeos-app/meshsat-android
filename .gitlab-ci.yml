# =============================================================================
# MeshSat Android CI/CD Pipeline
# =============================================================================
# - Push to main: build debug APK (verify)
# - Tag push (v*): build signed release APK + AAB → upload to GitLab Package
#                  Registry → create GitLab Release → create GitHub Release
# =============================================================================

stages:
  - build
  - release

variables:
  GITHUB_REPO: "cubeos-app/meshsat-android"
  BAO_ADDR: "https://openbao.nuclearlighters.net:8200"

# =============================================================================
# Build debug APK (every push to main — verification only)
# =============================================================================
build-debug:
  stage: build
  image: cimg/android:2024.10.1
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
  script:
    - bash ./gradlew assembleDebug
    - |
      APK_PATH=$(find app/build/outputs/apk/debug -name "*.apk" | head -1)
      VERSION="dev-${CI_COMMIT_SHORT_SHA}"
      APK_NAME="meshsat-android-${VERSION}-debug.apk"
      cp "$APK_PATH" "$APK_NAME"
      echo "Built: ${APK_NAME} ($(du -h ${APK_NAME} | cut -f1))"
  artifacts:
    paths:
      - "meshsat-android-*-debug.apk"
    expire_in: 7 days

# =============================================================================
# Build signed release APK + AAB (tag push only)
# Authenticates to OpenBao via GitLab JWT, fetches signing secrets, builds
# signed release artifacts for Play Store (AAB) and sideload (APK).
# =============================================================================
build-release:
  stage: build
  image: cimg/android:2024.10.1
  id_tokens:
    BAO_ID_TOKEN:
      aud: https://gitlab.nuclearlighters.net
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
  script:
    - |
      set -euo pipefail
      VERSION="${CI_COMMIT_TAG#v}"

      # ── Install CA certificate for OpenBao TLS ──
      if [ -n "${BAO_CA_CERT:-}" ]; then
        sudo mkdir -p /usr/local/share/ca-certificates
        echo "$BAO_CA_CERT" | sudo tee /usr/local/share/ca-certificates/openbao-ca.crt > /dev/null
        sudo update-ca-certificates
      fi

      # ── Authenticate to OpenBao via JWT ──
      echo "Authenticating to OpenBao..."
      BAO_RESPONSE=$(curl -sf \
        --request POST \
        --data "{\"role\": \"gitlab-ci\", \"jwt\": \"${BAO_ID_TOKEN}\"}" \
        "${BAO_ADDR}/v1/auth/jwt/login")
      BAO_TOKEN=$(echo "$BAO_RESPONSE" | jq -r '.auth.client_token')
      if [ -z "$BAO_TOKEN" ] || [ "$BAO_TOKEN" = "null" ]; then
        echo "ERROR: OpenBao JWT authentication failed."
        exit 1
      fi
      echo "  Authenticated."

      # ── Fetch signing secrets ──
      echo "Fetching signing secrets..."
      SECRETS=$(curl -sf \
        --header "X-Vault-Token: ${BAO_TOKEN}" \
        "${BAO_ADDR}/v1/secret/data/ci/android-signing")
      KEYSTORE_B64=$(echo "$SECRETS" | jq -r '.data.data.keystore_b64')
      export ANDROID_STORE_PASSWORD=$(echo "$SECRETS" | jq -r '.data.data.store_password')
      export ANDROID_KEY_PASSWORD=$(echo "$SECRETS" | jq -r '.data.data.key_password')
      export ANDROID_KEY_ALIAS=$(echo "$SECRETS" | jq -r '.data.data.key_alias')
      if [ -z "$KEYSTORE_B64" ] || [ "$KEYSTORE_B64" = "null" ]; then
        echo "ERROR: Failed to fetch keystore from OpenBao."
        exit 1
      fi
      echo "  Secrets fetched."

      # ── Decode keystore to temp file ──
      echo "$KEYSTORE_B64" | base64 -d > /tmp/meshsat-upload.p12
      export ANDROID_KEYSTORE_FILE="/tmp/meshsat-upload.p12"

      # ── Build signed release APK + AAB ──
      echo "Building signed release APK + AAB..."
      bash ./gradlew assembleRelease bundleRelease

      # ── Collect artifacts ──
      APK_PATH=$(find app/build/outputs/apk/release -name "*.apk" | head -1)
      AAB_PATH=$(find app/build/outputs/bundle/release -name "*.aab" | head -1)
      APK_NAME="meshsat-android-${VERSION}-release.apk"
      AAB_NAME="meshsat-android-${VERSION}-release.aab"
      cp "$APK_PATH" "$APK_NAME"
      cp "$AAB_PATH" "$AAB_NAME"
      echo "APK_NAME=${APK_NAME}" >> build.env
      echo "AAB_NAME=${AAB_NAME}" >> build.env
      echo "VERSION=${VERSION}" >> build.env
      echo "Built: ${APK_NAME} ($(du -h ${APK_NAME} | cut -f1))"
      echo "Built: ${AAB_NAME} ($(du -h ${AAB_NAME} | cut -f1))"

      # ── Clean up keystore ──
      rm -f /tmp/meshsat-upload.p12

      # ── Revoke OpenBao token ──
      curl -sf \
        --header "X-Vault-Token: ${BAO_TOKEN}" \
        --request POST \
        "${BAO_ADDR}/v1/auth/token/revoke-self" || true
  artifacts:
    paths:
      - "meshsat-android-*-release.apk"
      - "meshsat-android-*-release.aab"
    reports:
      dotenv: build.env
    expire_in: 7 days

# =============================================================================
# Upload APK + AAB to GitLab Package Registry (tag push only)
# =============================================================================
upload-package:
  stage: release
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
  needs:
    - job: build-release
      artifacts: true
  script:
    - apk add --no-cache curl
    - |
      set -e
      for FILE in "$APK_NAME" "$AAB_NAME"; do
        echo "Uploading ${FILE} to GitLab Package Registry..."
        curl --fail \
          --header "JOB-TOKEN: ${CI_JOB_TOKEN}" \
          --upload-file "${FILE}" \
          "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/meshsat-android/${VERSION}/${FILE}"
        echo "  Uploaded ${FILE}."
      done

# =============================================================================
# Create GitLab Release (tag push only)
# =============================================================================
create-gitlab-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
  needs:
    - job: build-release
      artifacts: true
    - job: upload-package
  script:
    - echo "Creating GitLab release for ${CI_COMMIT_TAG}"
  release:
    tag_name: $CI_COMMIT_TAG
    name: "MeshSat Android ${CI_COMMIT_TAG}"
    description: |
      MeshSat Android ${CI_COMMIT_TAG}

      ## Download

      - [${APK_NAME}](${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/meshsat-android/${VERSION}/${APK_NAME}) — Signed APK (sideload)
      - [${AAB_NAME}](${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/meshsat-android/${VERSION}/${AAB_NAME}) — Signed AAB (Play Store)
    assets:
      links:
        - name: "${APK_NAME}"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/meshsat-android/${VERSION}/${APK_NAME}"
          link_type: "package"
        - name: "${AAB_NAME}"
          url: "${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/packages/generic/meshsat-android/${VERSION}/${AAB_NAME}"
          link_type: "package"

# =============================================================================
# Create GitHub Release with APK + AAB assets (tag push only)
# =============================================================================
create-github-release:
  stage: release
  image: alpine:latest
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v/'
  needs:
    - job: build-release
      artifacts: true
  script:
    - apk add --no-cache curl jq
    - |
      set -e

      if [ -z "${GHCR_TOKEN:-}" ]; then
        echo "WARN: GHCR_TOKEN not set — skipping GitHub release."
        exit 0
      fi

      echo "============================================================"
      echo "  Create GitHub Release for ${CI_COMMIT_TAG}"
      echo "============================================================"

      RELEASE_BODY="## MeshSat Android ${CI_COMMIT_TAG}

      Android companion app for MeshSat — Meshtastic + Satellite gateway.

      ### Download

      Download the APK below and install on your Android device.
      The AAB is for Play Store distribution.

      ### Features
      - Meshtastic BLE radio connection
      - Iridium 9603N via HC-05 Bluetooth SPP
      - SMS gateway with AES-256-GCM encryption
      - Per-conversation encryption keys
      - Forwarding rules engine (mesh/iridium/SMS)
      - Node map with phone GPS + mesh positions
      - 6-hour signal history graphs
      - SOS emergency broadcast
      - Push notifications on incoming messages"

      # Check if release already exists (tag may arrive via mirror before this job)
      EXISTING=$(curl -s \
        -H "Authorization: token ${GHCR_TOKEN}" \
        -H "Accept: application/vnd.github+json" \
        "https://api.github.com/repos/${GITHUB_REPO}/releases/tags/${CI_COMMIT_TAG}")

      EXISTING_ID=$(echo "$EXISTING" | jq -r '.id // empty')

      if [ -n "$EXISTING_ID" ] && [ "$EXISTING_ID" != "null" ]; then
        echo "Updating existing release (ID: ${EXISTING_ID})..."
        curl -s -X PATCH \
          -H "Authorization: token ${GHCR_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${GITHUB_REPO}/releases/${EXISTING_ID}" \
          -d "$(jq -n \
            --arg name "MeshSat Android ${CI_COMMIT_TAG}" \
            --arg body "${RELEASE_BODY}" \
            '{name: $name, body: $body, prerelease: false}'
          )" > /dev/null
        RELEASE_ID="$EXISTING_ID"
        UPLOAD_URL="https://uploads.github.com/repos/${GITHUB_REPO}/releases/${RELEASE_ID}/assets"

        # Delete existing assets if present (re-upload fresh)
        ASSETS=$(curl -s \
          -H "Authorization: token ${GHCR_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${GITHUB_REPO}/releases/${RELEASE_ID}/assets")
        for ASSET_NAME in "$APK_NAME" "$AAB_NAME"; do
          OLD_ID=$(echo "$ASSETS" | jq -r ".[] | select(.name == \"${ASSET_NAME}\") | .id // empty")
          if [ -n "$OLD_ID" ]; then
            echo "  Deleting old asset: ${ASSET_NAME}..."
            curl -s -X DELETE \
              -H "Authorization: token ${GHCR_TOKEN}" \
              "https://api.github.com/repos/${GITHUB_REPO}/releases/assets/${OLD_ID}" > /dev/null
          fi
        done
        echo "  Release updated."
      else
        echo "Creating new release..."
        RESP=$(curl -s -X POST \
          -H "Authorization: token ${GHCR_TOKEN}" \
          -H "Accept: application/vnd.github+json" \
          "https://api.github.com/repos/${GITHUB_REPO}/releases" \
          -d "$(jq -n \
            --arg tag "${CI_COMMIT_TAG}" \
            --arg name "MeshSat Android ${CI_COMMIT_TAG}" \
            --arg body "${RELEASE_BODY}" \
            '{tag_name: $tag, name: $name, body: $body, draft: false, prerelease: false}'
          )")
        RELEASE_ID=$(echo "$RESP" | jq -r '.id')
        UPLOAD_URL="https://uploads.github.com/repos/${GITHUB_REPO}/releases/${RELEASE_ID}/assets"
        echo "  Release created (ID: ${RELEASE_ID})."
      fi

      # Upload APK as release asset
      echo "Uploading ${APK_NAME} ($(du -h ${APK_NAME} | cut -f1))..."
      UPLOAD_RESP=$(curl -s -w "\n%{http_code}" \
        --max-time 300 \
        -X POST \
        -H "Authorization: token ${GHCR_TOKEN}" \
        -H "Content-Type: application/vnd.android.package-archive" \
        "${UPLOAD_URL}?name=${APK_NAME}" \
        --data-binary "@${APK_NAME}")

      HTTP_CODE=$(echo "$UPLOAD_RESP" | tail -1)
      if [ "$HTTP_CODE" = "201" ]; then
        echo "  APK uploaded successfully."
      else
        echo "  WARN: APK upload returned HTTP ${HTTP_CODE}"
        echo "$UPLOAD_RESP" | sed '$d' | jq . 2>/dev/null || true
      fi

      # Upload AAB as release asset
      echo "Uploading ${AAB_NAME} ($(du -h ${AAB_NAME} | cut -f1))..."
      UPLOAD_RESP=$(curl -s -w "\n%{http_code}" \
        --max-time 300 \
        -X POST \
        -H "Authorization: token ${GHCR_TOKEN}" \
        -H "Content-Type: application/octet-stream" \
        "${UPLOAD_URL}?name=${AAB_NAME}" \
        --data-binary "@${AAB_NAME}")

      HTTP_CODE=$(echo "$UPLOAD_RESP" | tail -1)
      if [ "$HTTP_CODE" = "201" ]; then
        echo "  AAB uploaded successfully."
      else
        echo "  WARN: AAB upload returned HTTP ${HTTP_CODE}"
        echo "$UPLOAD_RESP" | sed '$d' | jq . 2>/dev/null || true
      fi

      echo "============================================================"
      echo "  GitHub Release: https://github.com/${GITHUB_REPO}/releases/tag/${CI_COMMIT_TAG}"
      echo "============================================================"
  allow_failure: true
